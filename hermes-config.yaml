###############################################################
# hermes-config.yaml
# Using AWS Bedrock — auth via IAM Task Role, no API key needed.
###############################################################

# ── Model ─────────────────────────────────────────────────
# Active Bedrock model IDs (as of May 2026):
#   bedrock:anthropic.claude-3-5-sonnet-20240620-v1:0   (Claude 3.5 Sonnet — active)
#   bedrock:anthropic.claude-3-5-haiku-20241022-v1:0    (Claude 3.5 Haiku)
#   bedrock:anthropic.claude-3-opus-20240229-v1:0       (Claude 3 Opus)
#   bedrock:amazon.nova-pro-v1:0                        (Amazon Nova Pro)
#   bedrock:amazon.nova-lite-v1:0                       (Amazon Nova Lite)
#   bedrock:meta.llama3-70b-instruct-v1:0               (Llama 3 70B)
model: "bedrock:anthropic.claude-3-5-sonnet-20240620-v1:0"

# ── Gateway ───────────────────────────────────────────────
gateway:
  host: "0.0.0.0"
  port: 8080
  telegram:
    enabled: false
  discord:
    enabled: false

# ── Memory ──────────────────────────────────────────────
memory:
  enabled: true
  autosave_interval: 30

terminal_backend: "local"

tools:
  web_search: true
  browser: false
  image_gen: false
  tts: false

skills:
  auto_create: true
  auto_improve: true
