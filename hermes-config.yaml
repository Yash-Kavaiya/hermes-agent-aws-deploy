###############################################################
# hermes-config.yaml
# Hermes Agent configuration — mounted into the container.
# Using AWS Bedrock — no API key needed, auth via IAM role.
###############################################################

# ── Model ─────────────────────────────────────────────────
# AWS Bedrock model IDs:
#   bedrock:anthropic.claude-3-5-sonnet-20241022-v2:0   (Claude 3.5 Sonnet v2)
#   bedrock:anthropic.claude-3-5-haiku-20241022-v1:0    (Claude 3.5 Haiku — faster/cheaper)
#   bedrock:anthropic.claude-3-opus-20240229-v1:0       (Claude 3 Opus)
#   bedrock:amazon.nova-pro-v1:0                        (Amazon Nova Pro)
#   bedrock:amazon.nova-lite-v1:0                       (Amazon Nova Lite)
#   bedrock:meta.llama3-70b-instruct-v1:0               (Llama 3 70B)
model: "bedrock:anthropic.claude-3-5-sonnet-20241022-v2:0"

# ── Gateway (web / messaging) ───────────────────────────
gateway:
  host: "0.0.0.0"
  port: 8080
  telegram:
    enabled: false
  discord:
    enabled: false

# ── Memory ──────────────────────────────────────────────
memory:
  enabled: true
  autosave_interval: 30

# ── Terminal backend ────────────────────────────────────
terminal_backend: "local"

# ── Tools ────────────────────────────────────────────────
tools:
  web_search: true
  browser: false
  image_gen: false
  tts: false

# ── Skills ──────────────────────────────────────────────
skills:
  auto_create: true
  auto_improve: true
