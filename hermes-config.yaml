###############################################################
# hermes-config.yaml
# Using AWS Bedrock — auth via IAM Task Role, no API key needed.
# Model: Claude Sonnet 4.5 via cross-region inference profile
###############################################################

# ── Model ────────────────────────────────────────────────────
# Cross-region inference profile ARN (us.*) automatically routes
# traffic across us-east-1, us-west-2, us-east-2 for higher
# throughput and resilience.
model: "bedrock:arn:aws:bedrock:us-east-1:502682267359:inference-profile/us.anthropic.claude-sonnet-4-5-20250929-v1:0"

# ── Gateway ──────────────────────────────────────────────────
gateway:
  host: "0.0.0.0"
  port: 8080
  telegram:
    enabled: false
  discord:
    enabled: false

# ── Memory ───────────────────────────────────────────────────
memory:
  enabled: true
  autosave_interval: 30

terminal_backend: "local"

tools:
  web_search: true
  browser: false
  image_gen: false
  tts: false

skills:
  auto_create: true
  auto_improve: true
